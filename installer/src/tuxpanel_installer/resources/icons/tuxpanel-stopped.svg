<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Body -->
  <ellipse cx="32" cy="40" rx="18" ry="16" fill="#555"/>
  <!-- Belly -->
  <ellipse cx="32" cy="42" rx="12" ry="11" fill="#bbb"/>
  <!-- Head -->
  <circle cx="32" cy="20" r="12" fill="#555"/>
  <!-- Eyes -->
  <circle cx="27" cy="18" r="2.5" fill="white"/>
  <circle cx="37" cy="18" r="2.5" fill="white"/>
  <circle cx="27.8" cy="18" r="1.2" fill="#333"/>
  <circle cx="37.8" cy="18" r="1.2" fill="#333"/>
  <!-- Beak -->
  <path d="M29 23 L32 27 L35 23" fill="#999" stroke="#888" stroke-width="0.5"/>
  <!-- Feet -->
  <path d="M24 54 L20 58 M24 54 L24 58 M24 54 L28 58" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M40 54 L36 58 M40 54 L40 58 M40 54 L44 58" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <!-- Flippers -->
  <path d="M14 34 Q10 40 14 48" stroke="#555" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M50 34 Q54 40 50 48" stroke="#555" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Terminal prompt on belly -->
  <text x="24" y="44" font-family="monospace" font-size="7" fill="#888" font-weight="bold">$_</text>
  <!-- Status dot (grey = stopped) -->
  <circle cx="54" cy="10" r="5" fill="#888" stroke="#444" stroke-width="1.5"/>
</svg>
